<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reports — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-variables.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-overrides.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-components.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <div class="d-flex min-vh-100">
      <nav class="mgrid-dash-sidebar mgrid-dash-sidebar-admin d-none d-xl-flex flex-column p-3" aria-label="Admin navigation">
        <div class="mgrid-sidebar-brand mb-3">M·GRID Admin</div>
        <ul class="nav nav-pills flex-column gap-1">
          <li><a class="nav-link" href="home.html">Overview</a></li>
          <li><a class="nav-link" href="users.html">Users</a></li>
          <li><a class="nav-link" href="loans.html">Loan requests</a></li>
          <li><a class="nav-link" href="partners.html">Partners</a></li>
          <li><a class="nav-link" href="benefits.html">Benefits</a></li>
          <li><a class="nav-link active" href="reports.html">Reports</a></li>
        </ul>
        <div class="mt-auto pt-4"><a href="../public/login.html">Logout</a></div>
      </nav>
      <main class="flex-grow-1 p-3 p-md-4">
        <h1 class="mgrid-page-header-title mb-4">Reports</h1>
        <form class="row g-3 mb-4 align-items-end" data-mgrid-demo data-success-msg="Export queued (demo).">
          <div class="col-md-3">
            <label class="form-label" for="d1">From</label>
            <input type="date" class="form-control" id="d1" />
          </div>
          <div class="col-md-3">
            <label class="form-label" for="d2">To</label>
            <input type="date" class="form-control" id="d2" />
          </div>
          <div class="col-md-2">
            <label class="form-label" for="reg">Region</label>
            <select class="form-select" id="reg"><option>All</option><option>DSM</option></select>
          </div>
          <div class="col-md-2">
            <label class="form-label" for="fmt">Format</label>
            <select class="form-select" id="fmt"><option>CSV</option><option>PDF</option><option>Excel</option></select>
          </div>
          <div class="col-md-2">
            <button type="submit" class="btn btn-primary w-100">Export</button>
          </div>
        </form>
        <div class="list-group">
          <a class="list-group-item list-group-item-action" href="#">Registration summary — by region</a>
          <a class="list-group-item list-group-item-action" href="#">M-Score distribution</a>
          <a class="list-group-item list-group-item-action" href="#">Document verification status</a>
          <a class="list-group-item list-group-item-action" href="#">Loan performance</a>
          <a class="list-group-item list-group-item-action" href="#">Partner engagement</a>
        </div>
      </main>
    </div>
    <div id="mgridToastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/mgrid-i18n.js"></script>
    <script src="../assets/js/mgrid-core.js"></script>
  </body>
</html>
