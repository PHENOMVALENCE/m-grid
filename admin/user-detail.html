<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>User detail — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-variables.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-overrides.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-components.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <div class="container-fluid py-4">
      <nav aria-label="Breadcrumb" class="mb-3">
        <ol class="breadcrumb mb-0">
          <li class="breadcrumb-item"><a href="users.html">Users</a></li>
          <li class="breadcrumb-item active" aria-current="page">M-2025-000001</li>
        </ol>
      </nav>
      <div class="row g-4">
        <div class="col-lg-3">
          <div class="card border-0 shadow-sm p-3">
            <div class="mgrid-avatar-gold mgrid-avatar-lg mx-auto mb-3">A</div>
            <h2 class="h5 text-center">Amina Hassan</h2>
            <p class="small text-center text-muted font-monospace mb-0">M-2025-000001</p>
            <p class="small text-center text-muted">DSM · since Jan 2025</p>
            <div class="text-center mb-3"><span class="mscore-badge mscore-gold mgrid-testimonial-score mx-auto"><span class="mscore-value">72</span></span></div>
            <div class="d-grid gap-2">
              <button type="button" class="btn btn-outline-primary btn-sm" data-mgrid-demo>Message</button>
              <button type="button" class="btn btn-outline-danger btn-sm" data-mgrid-demo>Deactivate</button>
            </div>
          </div>
        </div>
        <div class="col-lg-6">
          <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item" role="presentation"><button class="nav-link active" id="u1-tab" data-bs-toggle="tab" data-bs-target="#u1" type="button" role="tab">Profile</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="u2-tab" data-bs-toggle="tab" data-bs-target="#u2" type="button" role="tab">Documents</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="u3-tab" data-bs-toggle="tab" data-bs-target="#u3" type="button" role="tab">Score</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="u4-tab" data-bs-toggle="tab" data-bs-target="#u4" type="button" role="tab">Loans</button></li>
            <li class="nav-item" role="presentation"><button class="nav-link" id="u5-tab" data-bs-toggle="tab" data-bs-target="#u5" type="button" role="tab">Activity</button></li>
          </ul>
          <div class="tab-content card border-0 shadow-sm p-3">
            <div class="tab-pane fade show active" id="u1" role="tabpanel">
              <p class="small text-muted mb-0">Read-only profile fields (demo).</p>
            </div>
            <div class="tab-pane fade" id="u2" role="tabpanel">
              <button type="button" class="btn btn-success btn-sm me-2" data-mgrid-demo>Verify</button>
              <button type="button" class="btn btn-outline-danger btn-sm" data-mgrid-demo>Reject</button>
            </div>
            <div class="tab-pane fade" id="u3" role="tabpanel"><p class="small text-muted">Milestone table (mock).</p></div>
            <div class="tab-pane fade" id="u4" role="tabpanel"><p class="small text-muted">Loan history (mock).</p></div>
            <div class="tab-pane fade" id="u5" role="tabpanel"><p class="small text-muted">Audit log (mock).</p></div>
          </div>
        </div>
        <div class="col-lg-3">
          <div class="card border-0 shadow-sm p-3">
            <h3 class="h6">Admin notes</h3>
            <label class="visually-hidden" for="adminNotes">Internal notes</label>
            <textarea class="form-control form-control-sm mb-2" id="adminNotes" rows="4" placeholder="Internal notes only"></textarea>
            <div class="d-flex flex-wrap gap-1 mb-2">
              <span class="badge bg-light text-dark border">At risk</span>
              <span class="badge bg-light text-dark border">Priority</span>
            </div>
            <p class="small text-muted mb-0">Last reviewed: 10 Apr 2026</p>
          </div>
        </div>
      </div>
    </div>
    <div id="mgridToastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/mgrid-i18n.js"></script>
    <script src="../assets/js/mgrid-core.js"></script>
  </body>
</html>
