<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Partners — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-variables.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-overrides.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-components.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <div class="d-flex min-vh-100">
      <nav class="mgrid-dash-sidebar mgrid-dash-sidebar-admin d-none d-xl-flex flex-column p-3" aria-label="Admin navigation">
        <div class="mgrid-sidebar-brand mb-3">M·GRID Admin</div>
        <ul class="nav nav-pills flex-column gap-1">
          <li><a class="nav-link" href="home.html">Overview</a></li>
          <li><a class="nav-link" href="users.html">Users</a></li>
          <li><a class="nav-link" href="loans.html">Loan requests</a></li>
          <li><a class="nav-link active" href="partners.html">Partners</a></li>
          <li><a class="nav-link" href="benefits.html">Benefits</a></li>
          <li><a class="nav-link" href="reports.html">Reports</a></li>
        </ul>
        <div class="mt-auto pt-4"><a href="../public/login.html">Logout</a></div>
      </nav>
      <main class="flex-grow-1 p-3 p-md-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h1 class="mgrid-page-header-title mb-0">Partners</h1>
          <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#partnerModal">Add partner</button>
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th scope="col">Logo</th>
                <th scope="col">Name</th>
                <th scope="col">Category</th>
                <th scope="col">Tier</th>
                <th scope="col">Active</th>
                <th scope="col">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><div class="mgrid-avatar-gold">N</div></td>
                <td>NMB</td>
                <td>Finance</td>
                <td>Silver</td>
                <td>
                  <div class="form-check form-switch mb-0">
                    <input class="form-check-input" type="checkbox" checked aria-label="Active NMB" />
                  </div>
                </td>
                <td><button type="button" class="btn btn-sm btn-link">Edit</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
    <div class="modal fade" id="partnerModal" tabindex="-1" aria-labelledby="partnerModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-scrollable">
        <div class="modal-content mgrid-modal-rounded">
          <div class="modal-header">
            <h2 class="modal-title h5" id="partnerModalLabel">Add partner</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <form data-mgrid-demo data-success-msg="Partner saved (demo).">
            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label" for="pname">Partner name</label>
                <input type="text" class="form-control" id="pname" required />
              </div>
              <div class="mb-3">
                <label class="form-label" for="pcat">Category</label>
                <select class="form-select" id="pcat" required>
                  <option>Finance</option>
                  <option>Training</option>
                  <option>Legal</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label" for="ptier">Available from tier</label>
                <select class="form-select" id="ptier">
                  <option>Bronze</option>
                  <option>Silver</option>
                  <option>Gold</option>
                  <option>Diamond</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label" for="pdesc">Description</label>
                <textarea class="form-control" id="pdesc" rows="3"></textarea>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="submit" class="btn btn-primary">Save partner</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div id="mgridToastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/mgrid-i18n.js"></script>
    <script src="../assets/js/mgrid-core.js"></script>
  </body>
</html>
