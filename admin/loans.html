<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loan requests — Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-variables.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-overrides.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-components.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <div class="d-flex min-vh-100">
      <nav class="mgrid-dash-sidebar mgrid-dash-sidebar-admin d-none d-xl-flex flex-column p-3" aria-label="Admin navigation">
        <div class="mgrid-sidebar-brand mb-3">M·GRID Admin</div>
        <ul class="nav nav-pills flex-column gap-1">
          <li><a class="nav-link" href="home.html">Overview</a></li>
          <li><a class="nav-link" href="users.html">Users</a></li>
          <li><a class="nav-link active" href="loans.html">Loan requests</a></li>
          <li><a class="nav-link" href="partners.html">Partners</a></li>
          <li><a class="nav-link" href="benefits.html">Benefits</a></li>
          <li><a class="nav-link" href="reports.html">Reports</a></li>
        </ul>
        <div class="mt-auto pt-4"><a href="../public/login.html">Logout</a></div>
      </nav>
      <main class="flex-grow-1 p-3 p-md-4">
        <h1 class="mgrid-page-header-title mb-4">Loan requests</h1>
        <div class="row g-3">
          <div class="col-md-6 col-xl-3">
            <div class="mgrid-kanban-col p-3 border-top border-primary border-3">
              <h2 class="h6 text-primary">New</h2>
              <div class="card mgrid-kanban-card mb-2">
                <div class="card-body p-2">
                  <div class="small fw-semibold">Amina Hassan</div>
                  <div class="small text-muted font-monospace">M-2026-001</div>
                  <div class="small">TZS 1.2M · CRDB</div>
                  <button type="button" class="btn btn-sm btn-link p-0" data-bs-toggle="modal" data-bs-target="#loanModal">Review</button>
                </div>
              </div>
            </div>
          </div>
          <div class="col-md-6 col-xl-3">
            <div class="mgrid-kanban-col p-3 border-top border-warning border-3">
              <h2 class="h6 text-warning">Under review</h2>
              <p class="small text-muted mb-0">No items</p>
            </div>
          </div>
          <div class="col-md-6 col-xl-3">
            <div class="mgrid-kanban-col p-3 border-top border-success border-3">
              <h2 class="h6 text-success">Approved</h2>
              <p class="small text-muted mb-0">—</p>
            </div>
          </div>
          <div class="col-md-6 col-xl-3">
            <div class="mgrid-kanban-col p-3 border-top border-danger border-3">
              <h2 class="h6 text-danger">Rejected</h2>
              <p class="small text-muted mb-0">—</p>
            </div>
          </div>
        </div>
      </main>
    </div>
    <div class="modal fade" id="loanModal" tabindex="-1" aria-labelledby="loanModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content mgrid-modal-rounded">
          <div class="modal-header">
            <h2 class="modal-title h5" id="loanModalLabel">Loan review</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p class="small text-muted">Applicant M-Score 72 · documents 5/6 verified.</p>
            <label class="form-label" for="loanNotes">Notes</label>
            <textarea class="form-control mb-3" id="loanNotes" rows="3"></textarea>
            <div class="d-flex flex-wrap gap-2">
              <button type="button" class="btn btn-success btn-sm" data-mgrid-demo>Approve</button>
              <button type="button" class="btn btn-outline-danger btn-sm" data-mgrid-demo>Reject</button>
              <button type="button" class="btn btn-outline-secondary btn-sm" data-mgrid-demo>Request info</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="mgridToastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/mgrid-i18n.js"></script>
    <script src="../assets/js/mgrid-core.js"></script>
  </body>
</html>
