<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create your M-ID — M-Grid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-variables.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-overrides.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-components.css" rel="stylesheet" />
    <link href="../assets/css/mgrid-animations.css" rel="stylesheet" />
  </head>
  <body class="bg-white">
    <div class="min-vh-100 d-lg-flex">
      <!-- Left panel -->
      <div class="d-none d-lg-flex flex-column justify-content-between col-lg-5 mgrid-register-left p-5">
        <div>
          <div class="mgrid-logo-text-light mb-4">M·GRID</div>
          <p class="lead text-white opacity-90 mgrid-register-lead">
            Your verified path to opportunity starts with one M-ID.
          </p>
        </div>
        <div class="mgrid-mid-card text-dark mt-4">
          <div class="small text-muted text-uppercase">Sample card</div>
          <div class="mgrid-mid-card-mono">M-2026-000104</div>
          <div class="fw-semibold mt-2">Neema Joseph</div>
          <div class="small text-muted">Mbeya · Gold</div>
        </div>
        <p class="small mb-0">
          <a class="text-white text-decoration-underline" href="login.html">Already have an M-ID? Sign in</a>
        </p>
      </div>

      <!-- Form -->
      <div class="col-lg-7 d-flex align-items-center justify-content-center p-4 p-lg-5">
        <div class="w-100 mgrid-max-w-460">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div id="regStepIndicator" data-step="1" class="small text-muted w-100 text-center">
              <span class="fw-semibold text-dark">Step 1</span> ● — ○ <span class="text-muted">Step 2</span>
            </div>
          </div>
          <h1 class="h2 mgrid-section-heading mb-1">Create your M-ID</h1>
          <p class="text-muted small mb-4">Takes less than 3 minutes</p>

          <form id="regStep1" data-mgrid-demo data-success-msg="Step 1 saved (demo). Continue to business info.">
            <div class="mb-3">
              <label class="form-label" for="fullName">Full name</label>
              <input type="text" class="form-control" id="fullName" name="fullName" required autocomplete="name" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="phone">Phone number</label>
              <div class="input-group">
                <span class="input-group-text">+255</span>
                <input type="tel" class="form-control" id="phone" name="phone" required autocomplete="tel" />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="email">Email address</label>
              <input type="email" class="form-control" id="email" name="email" autocomplete="email" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="dob">Date of birth</label>
              <input type="date" class="form-control" id="dob" name="dob" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="region">Region</label>
              <select class="form-select" id="region" name="region" required>
                <option value="">Choose…</option>
                <option>Dar es Salaam</option>
                <option>Mwanza</option>
                <option>Mbeya</option>
                <option>Dodoma</option>
                <option>Arusha</option>
                <option>Other</option>
              </select>
            </div>
            <div class="mb-2">
              <label class="form-label" for="regPassword">Password</label>
              <input type="password" class="form-control" id="regPassword" name="regPassword" required minlength="8" autocomplete="new-password" />
              <div class="progress mt-2 mgrid-progress-h-6" aria-hidden="true">
                <div class="progress-bar bg-secondary" id="passwordStrengthBar" role="presentation"></div>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="regPassword2">Confirm password</label>
              <input type="password" class="form-control" id="regPassword2" name="regPassword2" required autocomplete="new-password" />
            </div>
            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" id="terms" required />
              <label class="form-check-label small" for="terms">I agree to the Terms &amp; Privacy Policy</label>
            </div>
            <button type="button" class="btn btn-primary w-100" id="regBtnNext">Continue to Step 2</button>
          </form>

          <form id="regStep2" class="d-none" data-mgrid-demo data-success-msg="Registration complete (demo). M-ID: M-2026-009901">
            <div class="mb-3">
              <span class="form-label d-block">Do you have a registered business?</span>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="biz" id="bizY" value="yes" />
                <label class="form-check-label" for="bizY">Yes</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="biz" id="bizN" value="no" checked />
                <label class="form-check-label" for="bizN">No</label>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label" for="bizName">Business name</label>
              <input type="text" class="form-control" id="bizName" name="bizName" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="bizType">Business type</label>
              <select class="form-select" id="bizType" name="bizType">
                <option>Sole proprietor</option>
                <option>Company</option>
                <option>Cooperative</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label" for="bank">Do you have a bank account?</label>
              <select class="form-select" id="bank" name="bank">
                <option value="yes">Yes</option>
                <option value="no">No</option>
              </select>
            </div>
            <div class="mb-4">
              <label class="form-label" for="hear">How did you hear about M-Grid?</label>
              <select class="form-select" id="hear" name="hear">
                <option>Clouds Media</option>
                <option>Partner referral</option>
                <option>Community event</option>
                <option>Other</option>
              </select>
            </div>
            <div class="d-flex gap-2">
              <button type="button" class="btn btn-outline-secondary flex-grow-1" id="regBtnBack">Back</button>
              <button type="submit" class="btn btn-primary flex-grow-1">Create my M-ID</button>
            </div>
          </form>

          <p class="text-center small text-muted mt-4 d-lg-none">
            <a href="login.html">Already have an M-ID? Sign in</a>
          </p>
        </div>
      </div>
    </div>

    <div id="mgridToastContainer" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/mgrid-i18n.js"></script>
    <script src="../assets/js/mgrid-core.js"></script>
  </body>
</html>
